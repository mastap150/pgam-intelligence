name: msn-bootstrap

# One-shot job to reseed the GitHub Actions cache that backs
# `msn-insights.yml`. Run this whenever the MSN Partner Hub session has
# gone 401 (Microsoft kills refresh tokens after a few days; the
# upstream comment claiming ~30 days is optimistic).
#
# Operator flow on the workstation:
#   1. With the local scheduler paused, run
#        MSN_HEADLESS=0 python3 -m agents.etl.msn_insights_etl --dry-run
#      and complete login + MFA in the visible Chromium window. The
#      persisted profile under ~/.pgam/msn-session/ is now fresh.
#   2. Tar + zstd (excluding Singleton* locks and cache subdirs), then
#      symmetric-encrypt with the passphrase stored in the
#      MSN_SESSION_BOOTSTRAP_KEY repo secret:
#        openssl enc -aes-256-cbc -pbkdf2 -iter 200000 \
#          -pass file:/path/to/key.txt \
#          -in msn-session.tar.zst -out msn-session.tar.zst.enc
#   3. Attach `msn-session.tar.zst.enc` to a *draft* GitHub release
#      (drafts are collaborator-only on a public repo, so the cookies
#      stay private). Default tag: msn-session-bootstrap-YYYYMMDD.
#   4. Trigger this workflow with that tag. It downloads, decrypts,
#      extracts to `.msn-session/`, and writes the result to actions
#      cache under a key the scheduled `msn-insights.yml` job picks up
#      via its `restore-keys: msn-session-` prefix fallback.
#   5. Delete the draft release once the next scheduled run succeeds.
#
# Do NOT commit the tarball or the passphrase. The repo is public.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Draft release tag holding msn-session.tar.zst.enc"
        required: true
        default: "msn-session-bootstrap-20260529"

concurrency:
  # Don't race the scheduled puller — both want the same cache key prefix.
  group: msn-insights
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MSN_SESSION_BOOTSTRAP_KEY: ${{ secrets.MSN_SESSION_BOOTSTRAP_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Download encrypted session tarball
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "msn-session.tar.zst.enc" \
            --output msn-session.tar.zst.enc
          ls -lh msn-session.tar.zst.enc

      - name: Decrypt + extract
        run: |
          printf '%s' "$MSN_SESSION_BOOTSTRAP_KEY" > /tmp/key.txt
          chmod 600 /tmp/key.txt
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -pass file:/tmp/key.txt \
            -in msn-session.tar.zst.enc \
            -out msn-session.tar.zst
          rm /tmp/key.txt msn-session.tar.zst.enc
          mkdir -p .msn-session-staging
          tar --use-compress-program=unzstd -xf msn-session.tar.zst -C .msn-session-staging
          # Tarball root is `msn-session/` (from the local ~/.pgam layout).
          # Hoist its contents up to `.msn-session/` to match the path the
          # scheduled workflow uses.
          mv .msn-session-staging/msn-session .msn-session
          rm -rf .msn-session-staging msn-session.tar.zst
          ls .msn-session | head -10

      - name: Save to actions cache
        # Key uses the same `msn-session-` prefix the scheduled job's
        # `restore-keys:` fallback matches, and a fresh run_id suffix so
        # the most-recent-wins behavior picks this entry.
        uses: actions/cache/save@v4
        with:
          path: .msn-session
          key: msn-session-bootstrap-${{ github.run_id }}
