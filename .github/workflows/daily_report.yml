name: Daily Sabiomobile Report Sync

on:
  schedule:
    # Runs at 9:00 AM ET (14:00 UTC) — script retries every 20 min up to 5x
    # so covers any email arriving up to ~10:40 AM ET
    - cron: "0 14 * * *"
  workflow_dispatch:          # allows manual trigger from GitHub Actions UI
    inputs:
      date:
        description: "Report date (YYYY-MM-DD). Leave blank for yesterday."
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # covers 5 retries × 20 min each

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        working-directory: reports
        env:
          CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TOKEN_PICKLE_B64:  ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
        run: |
          echo "$CREDENTIALS_JSON" > credentials.json
          echo "$TOKEN_PICKLE_B64" | base64 -d > token.pickle

      - name: Run report sync
        working-directory: reports
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 daily_report_sync.py --date "${{ github.event.inputs.date }}"
          else
            python3 daily_report_sync.py --retries 5 --retry-interval 20
          fi

      - name: Refresh token if updated
        # If the OAuth token was refreshed during the run, update the secret
        # so the next run doesn't need re-auth.
        if: always()
        working-directory: reports
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO:     ${{ github.repository }}
        run: |
          if [ -f token.pickle ]; then
            NEW_TOKEN=$(base64 -w0 token.pickle)
            gh secret set GOOGLE_TOKEN_PICKLE_B64 --body "$NEW_TOKEN" --repo "$REPO" || true
          fi
