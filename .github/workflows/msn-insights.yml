name: msn-insights

# Pulls MSN Partner Hub insights for BoxingNews (partner AA1lKiff) every
# 15 minutes via the refresh-token chain — no browser, no Playwright.
# Reads the rotating refresh_token from pgam_direct.msn_oauth_token,
# mints a fresh access_token via Microsoft's OAuth endpoint, hits
# api.msn.com/realtime directly.
#
# 2026-05-19 architecture pivot. Prior versions of this workflow used
# Playwright + a persisted Chromium profile (stored in Neon as
# chunked BYTEA). That worked for one run but the session would
# expire ~16-24h later because MSN's `_C_Auth` cookies are session-
# only by design. The new approach bypasses the browser entirely:
#   - One-time interactive bootstrap (scripts/msn_oauth_capture.py)
#     captures the refresh_token from the SPA's MSAL flow
#   - This workflow uses refresh-token rotation: each run mints a new
#     access_token AND a new refresh_token, indefinitely
#   - Chain breaks only if we miss a >24h refresh window
#
# Cost: ~15 sec/run × 96 runs/day = ~24 min/day Actions runtime.

on:
  schedule:
    # */15 lands at :00, :15, :30, :45 UTC. GitHub may delay by up to
    # ~5-10 min during peak load; the puller is idempotent.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Neon writes (debug)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: msn-insights
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PGAM_DIRECT_DATABASE_URL: ${{ secrets.PGAM_DIRECT_DATABASE_URL }}
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secret present and DSN shape valid
        # Fails fast with a clear error if PGAM_DIRECT_DATABASE_URL is
        # missing or malformed. Historical failure mode (2026-07): a
        # placeholder-style DSN got saved to the secret and every
        # subsequent run died deep in psycopg with:
        #     ProgrammingError: missing "=" after "***" in connection info string
        # The `***` is GH Actions' log redaction of the malformed value,
        # so the true error was unreadable in the run log. This preflight
        # asserts the shape without ever echoing the DSN itself.
        #
        # Note: MSN_EMAIL / MSN_PASSWORD are no longer required. The
        # refresh-token puller (2026-05-19 architecture pivot) reads
        # the rotating refresh_token from pgam_direct.msn_oauth_token
        # and mints access tokens directly against Microsoft OAuth —
        # no browser, no user credentials.
        run: |
          set -euo pipefail
          if [ -z "${PGAM_DIRECT_DATABASE_URL:-}" ]; then
            echo "::error title=Missing required secret::PGAM_DIRECT_DATABASE_URL"
            echo "Add via: gh secret set PGAM_DIRECT_DATABASE_URL --repo mastap150/pgam-intelligence"
            exit 1
          fi
          dsn="${PGAM_DIRECT_DATABASE_URL}"
          case "$dsn" in
            postgresql://*|postgres://*) ;;
            *)
              echo "::error title=Malformed DSN::PGAM_DIRECT_DATABASE_URL does not start with postgresql:// or postgres://. Value likely still a placeholder."
              exit 1
              ;;
          esac
          # Must have @host and /database segments after the scheme.
          case "$dsn" in
            *@*/*) ;;
            *)
              echo "::error title=Malformed DSN::PGAM_DIRECT_DATABASE_URL missing user@host/database segments. Value not logged."
              exit 1
              ;;
          esac
          echo "preflight ok: DSN shape looks valid"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Preflight — OAuth refresh_token row exists
        # After the DSN passes, verify the bootstrap has been run. This
        # is a one-time interactive step (scripts/msn_oauth_capture.py)
        # that captures a refresh_token during a real MSAL login. If
        # the row is missing (or the chain broke past its 24h window),
        # the puller can't mint an access_token and every run fails
        # with a stack trace deep in HTTP land.
        #
        # Surfacing this as an ::error at preflight means the run
        # summary points at the actual fix instead of "check the log".
        run: |
          set -euo pipefail
          python -m pip install --quiet --upgrade pip
          pip install --quiet "psycopg[binary]>=3.1.0"
          python - <<'PY'
          import os, sys, psycopg
          dsn = os.environ["PGAM_DIRECT_DATABASE_URL"]
          with psycopg.connect(dsn, connect_timeout=15) as conn, conn.cursor() as cur:
              cur.execute(
                  "SELECT refresh_expires_at, refresh_count "
                  "FROM pgam_direct.msn_oauth_token "
                  "WHERE id = 'msn-partner-hub-boxingnews-primary'"
              )
              row = cur.fetchone()
          if not row:
              print(
                  "::error title=OAuth bootstrap missing::"
                  "No row in pgam_direct.msn_oauth_token. "
                  "Run scripts/msn_oauth_capture.py locally once to capture the "
                  "refresh_token; then cron takes over indefinitely."
              )
              sys.exit(1)
          refresh_expires_at, refresh_count = row
          # Warn (don't fail) if the refresh window is imminent — gives
          # us a few hours to notice before the chain actually breaks.
          from datetime import datetime, timezone, timedelta
          now = datetime.now(timezone.utc)
          if refresh_expires_at and refresh_expires_at < now:
              print(
                  "::error title=OAuth chain broken::"
                  f"refresh_token expired at {refresh_expires_at.isoformat()}. "
                  "Re-run scripts/msn_oauth_capture.py to re-bootstrap."
              )
              sys.exit(1)
          if refresh_expires_at and refresh_expires_at < now + timedelta(hours=6):
              print(
                  "::warning title=OAuth chain expiring soon::"
                  f"refresh_token expires {refresh_expires_at.isoformat()} — "
                  f"chain has rotated {refresh_count} times; next cron will refresh."
              )
          print(f"preflight ok: oauth row present, refresh_count={refresh_count}, expires={refresh_expires_at}")
          PY

      - name: Install Python deps (HTTP-only puller — no Playwright)
        # The refresh-token puller only needs requests + psycopg, which
        # are already in requirements.txt. Skipping the full install for
        # speed; pip install just these two saves ~30 sec/run.
        run: |
          python -m pip install --upgrade pip
          pip install "requests>=2.31.0" "psycopg[binary]>=3.1.0" "python-dotenv>=1.0.0"

      - name: Run MSN refresh-token puller
        run: python scripts/msn_refresh_puller.py

      - name: Run docID resolver (lazy backfill — pure HTTP, no auth)
        if: always()
        run: |
          python -m pip install --upgrade pip
          pip install "requests>=2.31.0" "psycopg[binary]>=3.1.0"
          python -m agents.enrichment.msn_doc_resolver
