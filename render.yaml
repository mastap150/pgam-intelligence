services:
  - type: worker
    name: pgam-intelligence-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    plan: starter          # upgrade to standard if you need more CPU/RAM
    autoDeploy: true

    envVars:
      # ── Anthropic ────────────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false        # set manually in Render dashboard

      # ── LL (LiveRamp / pgamrtb) ───────────────────────────────────────────────
      - key: LL_API_BASE_URL
        sync: false
      - key: LL_CLIENT_KEY
        sync: false
      - key: LL_SECRET_KEY
        sync: false
      - key: LL_UI_EMAIL
        sync: false
      - key: LL_UI_PASSWORD
        sync: false
      - key: LL_DRY_RUN
        value: "false"     # safety: set to "true" here and override in dashboard if needed

      # ── TB (TechBid / ssp.pgammedia.com Management API) ───────────────────────
      # Required by core/tb_api.py for token creation.
      # Without these, every TB agent fails at first API call with no token.
      # Set the values in the Render dashboard (Environment → Add Environment Variable).
      - key: TB_EMAIL
        sync: false
      - key: TB_PASSWORD
        sync: false
      - key: TB_USER_ID
        value: "45"        # PGAM Media's TB user_id; default for list_inventory scope

      # ── Notifications ────────────────────────────────────────────────────────
      - key: SLACK_WEBHOOK
        sync: false
      - key: SENDGRID_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false

      # ── Timezone (keep scheduler in ET) ──────────────────────────────────────
      - key: TZ
        value: America/New_York

      # ── Runtime behavior ─────────────────────────────────────────────────────
      # Force Python stdout to flush line-by-line. Without this, Render's log
      # stream shows nothing from print() calls until the buffer fills.
      - key: PYTHONUNBUFFERED
        value: "1"

      # ── ML tranche 5 — dayparting rotator ────────────────────────────────────
      # Default off; override to "1" in the Render dashboard to enable per-hour
      # floor writes. See intelligence/dayparting.py for the rotator logic.
      - key: PGAM_DAYPARTING_ENABLED
        value: "0"

      # ── ML optimizer proposer auto-apply ────────────────────────────────────
      # HARD DEFAULT OFF after the 2026-04-18 incident where the portfolio
      # optimizer autonomously dropped 9 Dots floors to $0, violating the
      # $1.70 contract minimum and costing ~$900 on the following Saturday.
      # Proposals are now posted to Slack for supervised weekly review.
      # Set to "1" in the Render dashboard ONLY if you deliberately want the
      # proposer to auto-apply high-confidence proposals again.
      - key: PGAM_OPTIMIZER_AUTO_APPLY
        value: "0"

      # ── Legacy floor_optimizer (every 2h tuner) ─────────────────────────────
      # DISABLED after 2026-04-24 revenue drop. Its writes were silent no-ops
      # for months (broken endpoint). When PR #8 routed them through the
      # working endpoint on 2026-04-20, the every-2h tuning started thrashing
      # floors (±39% in a single run), tanking revenue. Re-enable only after
      # the tuning logic is reviewed and slowed to weekly cadence.
      - key: PGAM_FLOOR_OPTIMIZER_ENABLED
        value: "0"
